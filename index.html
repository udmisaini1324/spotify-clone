<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify clone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <aside class="sidebar">

            <h2 class="logo">
                <i class="fa-brands fa-spotify"></i>
                Spotify
            </h2>

            <nav>

                <ul>
                    <li><i class="fa-solid fa-house"></i> Home</li>
                    <li><i class="fa-solid fa-book"></i> Your Library</li>
                </ul>

            </nav>

            <div class="library">

                <h3>Your Playlists</h3>

                <ul>
                    <li>❤️ Liked Songs</li>
                    <li>🎧 Chill Mix</li>
                    <li>🔥 Top Hits</li>
                    <li>💻 Coding Playlist</li>
                    <li>🌙 Late Night Vibes</li>
                </ul>

            </div>

        </aside>
        <main class="main-content">
            <header class="top-bar">

                <div class="nav-buttons">
                    <button><i class="fa-solid fa-chevron-left"></i></button>
                    <button><i class="fa-solid fa-chevron-right"></i></button>
                </div>

                <div class="top-right">
                    <button><i class="fa-regular fa-bell"></i></button>
                    <button class="profile-btn">
                        <i class="fa-solid fa-user"></i>
                    </button>
                </div>

            </header>

            <section class="content">

                <div class="search-box">
                    <input type="text" id="search-input" placeholder="Search songs...">
                </div>

                <h1 id="greeting"></h1>

                <div class="card-container">

                </div>

            </section>
        </main>
    </div>
    <footer class="player">

        <div class="player-left">

            <img id="player-cover" src="https://picsum.photos/60" alt="Album">

            <div class="song-info">
                <h4 id="player-title">No Song</h4>
                <p id="player-artist">Select a song</p>
            </div>

        </div>



        <div class="player-center">

            <div class="controls">
                <button id="prev-btn">
                    <i class="fa-solid fa-backward-step"></i>
                </button>

                <button id="play-btn">
                    <i class="fa-solid fa-play"></i>
                </button>

                <button id="next-btn">
                    <i class="fa-solid fa-forward-step"></i>
                </button>
            </div>

            <div class="progress-container">

                <span id="current-time">0:00</span>

                <input type="range" id="progress-bar" value="0" min="0" max="100">

                <span id="duration">0:00</span>

            </div>


        </div>

        <div class="player-right">

            <i class="fa-solid fa-volume-high" id="volume-icon"></i>

            <input type="range" id="volume-slider" min="0" max="100" value="100">

        </div>


    </footer>

    <footer class="copyright">
    <p>© 2026 Music Player | Inspired by Spotify | Made with ❤️ <strong>Udmi </strong></p>
</footer>

    <audio id="audio-player"></audio>
    <script src="script.js"></script>
</body>

</html>
